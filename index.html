<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.T.A.R.K. // MULTI-SYSTEM</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00f2ff; --bg: #020b16; --surf: #0a192f;
  --gold: #ffcc00; --red: #ff3e3e; --green: #2dd4a0;
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); color: #e1f5fe; font-family: 'Outfit', sans-serif;
  height: 100vh; overflow: hidden; position: relative;
}

/* ━━━━━━━━ STARK HUD OVERLAY ━━━━━━━━ */
body::after {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1000;
  background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%),
              linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
  background-size: 100% 3px, 3px 100%;
}

#app {
  max-width: 500px; margin: 0 auto; height: 100%;
  display: flex; flex-direction: column; padding: 20px;
}

.hud-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 15px; border: 1px solid rgba(0, 242, 255, 0.2); margin-bottom: 20px;
}

.arc-reactor {
  width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
  box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }

/* ━━━━━━━━ SCREENS ━━━━━━━━ */
.screen { display: none; flex-direction: column; flex: 1; }
.active { display: flex; }

.card {
  background: var(--surf); border: 1px solid rgba(0, 242, 255, 0.3);
  padding: 30px; border-radius: 4px; flex: 1; display: flex;
  flex-direction: column; justify-content: center; position: relative;
}

/* ━━━━━━━━ BUTTONS ━━━━━━━━ */
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
button {
  background: rgba(0, 242, 255, 0.05); border: 1px solid var(--accent);
  color: var(--accent); padding: 15px; font-family: 'Space Mono';
  font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s;
}
button:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
button:disabled { opacity: 0.3; cursor: not-allowed; }

.glitch-text { animation: glitch 0.3s ease-in-out; }
@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
  40% { transform: translate(3px, -2px); }
  100% { transform: translate(0); }
}
</style>
</head>
<body>

<div id="app">
  <div class="hud-header">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="arc-reactor"></div>
      <span style="font-size:0.7rem; letter-spacing:2px; font-family:'Space Mono';">STARK_OS // v6.0</span>
    </div>
    <div id="stat-display" style="color:var(--accent); font-size:0.8rem;">BOOTING...</div>
  </div>

  <div id="menu-screen" class="screen active">
    <div class="card">
      <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">20?</h1>
      <p style="opacity: 0.6; margin-bottom: 40px;">Choose operation mode:</p>
      
      <div class="btn-grid" style="grid-template-columns: 1fr;">
        <button onclick="startDaily()">Daily Challenge</button>
        <button onclick="startSolo()">Solo vs JARVIS</button>
        <button onclick="showMultiplayer()">Multiplayer Uplink</button>
      </div>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="card">
      <div id="q-text" class="glitch-text" style="font-size: 1.8rem; font-weight: 800; margin-bottom: 40px;">Initializing...</div>
      
      <div class="btn-grid" id="game-controls">
        <button onclick="sendInput(1)" style="border-color: var(--green);">Yes</button>
        <button onclick="sendInput(0)" style="border-color: var(--red);">No</button>
        <button onclick="sendInput(0.5)" style="grid-column: span 2; border-color: var(--gold);">Maybe</button>
      </div>
      <button id="back-btn" style="margin-top: 20px;" onclick="location.reload()">Abort Mission</button>
    </div>
  </div>

  <div id="multi-modal" class="screen">
    <div class="card">
      <h2 style="color:var(--accent); margin-bottom: 20px;">UPLINK ESTABLISHED</h2>
      <p style="font-size: 0.8rem; margin-bottom: 5px;">YOUR PEER ID:</p>
      <div id="my-id" style="font-family:'Space Mono'; background:rgba(255,255,255,0.1); padding:10px; margin-bottom:20px;">----</div>
      
      <input type="text" id="peer-input" placeholder="PASTE TARGET ID" style="background:none; border:1px solid var(--accent); color:white; padding:15px; margin-bottom:10px; width:100%; font-family:'Space Mono';">
      <button onclick="connectToPeer()" style="width:100%;">Connect to Host</button>
      <button onclick="showMenu()" style="width:100%; border:none; margin-top:10px;">Return</button>
    </div>
  </div>
</div>

<script>
/* ━━━━━━━━ KB EXPANSION ━━━━━━━━ */
const KB = [
  { w: "DOG", t: ["animal","pet","furry","alive"] },
  { w: "LAPTOP", t: ["electronic","screen","portable","work"] },
  { w: "APPLE", t: ["edible","fruit","round","plant"] },
  { w: "BICYCLE", t: ["transport","wheels","metal","outdoor"] },
  { w: "PILLOW", t: ["soft","bedroom","sleep","cloth"] },
  { w: "UMBRELLA", t: ["rain","portable","handle","cloth"] },
  { w: "HAMMER", t: ["tool","metal","heavy","build"] },
  { w: "GUITAR", t: ["musical","strings","wood","entertainment"] },
  { w: "TOASTER", t: ["electronic","kitchen","heat","bread"] },
  { w: "CACTUS", t: ["plant","spiky","green","desert"] }
];

const QUESTIONS = [
  { q: "Is it a living organism?", t: "alive" },
  { q: "Is it electronic?", t: "electronic" },
  { q: "Can you eat it?", t: "edible" },
  { q: "Is it primarily metal?", t: "metal" },
  { q: "Is it used for work?", t: "work" },
  { q: "Is it found in the kitchen?", t: "kitchen" },
  { q: "Is it soft?", t: "soft" }
];

/* ━━━━━━━━ CORE ENGINE ━━━━━━━━ */
let mode = 'solo';
let candidates = [];
let asked = [];
let qCount = 1;
let currentTag = "";

function showMenu() { switchScreen('menu-screen'); }
function showMultiplayer() { switchScreen('multi-modal'); }

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// DAILY CHALLENGE LOGIC
function startDaily() {
  mode = 'daily';
  const seed = new Date().toDateString();
  const index = Math.abs(seed.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % KB.length;
  const dailyWord = KB[index];
  
  switchScreen('game-screen');
  document.getElementById('q-text').innerText = "DAILY CHALLENGE: Think of a common object. JARVIS is ready.";
  initGame();
}

function startSolo() {
  mode = 'solo';
  switchScreen('game-screen');
  initGame();
}

function initGame() {
  candidates = [...KB];
  asked = [];
  qCount = 1;
  document.getElementById('stat-display').innerText = "MODE: JARVIS_SENSORS";
  nextStep();
}

function nextStep() {
  if (qCount > 20 || candidates.length <= 1) {
    finish();
    return;
  }

  // Entropy Calculation (Best Question Picker)
  let bestQ = null;
  let minDiff = Infinity;

  QUESTIONS.forEach(q => {
    if (asked.includes(q.t)) return;
    let yesCount = candidates.filter(c => c.t.includes(q.t)).length;
    let diff = Math.abs(yesCount - (candidates.length / 2));
    if (diff < minDiff) { minDiff = diff; bestQ = q; }
  });

  if (bestQ) {
    currentTag = bestQ.t;
    document.getElementById('q-text').innerText = bestQ.q;
    document.getElementById('stat-display').innerText = `Q: ${qCount}/20`;
  } else {
    finish();
  }
}

function sendInput(val) {
  asked.push(currentTag);
  if (val === 1) candidates = candidates.filter(c => c.t.includes(currentTag));
  else if (val === 0) candidates = candidates.filter(c => !c.t.includes(currentTag));
  
  qCount++;
  document.getElementById('game-card')?.classList.add('glitch-text');
  setTimeout(() => document.getElementById('game-card')?.classList.remove('glitch-text'), 300);
  nextStep();
}

function finish() {
  const result = candidates.length > 0 ? candidates[0].w : "UNKNOWN SUBJECT";
  document.getElementById('q-text').innerHTML = `ANALYSIS COMPLETE:<br><span style="color:var(--accent)">${result}</span>`;
  document.getElementById('game-controls').style.display = 'none';
}

/* ━━━━━━━━ MULTIPLAYER (PEERJS) ━━━━━━━━ */
const peer = new Peer();
peer.on('open', id => document.getElementById('my-id').innerText = id);

peer.on('connection', conn => {
  conn.on('data', data => {
    // Handle remote game data here
    alert("Multiplayer Data Received: " + data);
  });
});

function connectToPeer() {
  const targetId = document.getElementById('peer-input').value;
  const conn = peer.connect(targetId);
  conn.on('open', () => {
    conn.send('Uplink Synchronized.');
    alert("Connected to Host!");
  });
}
</script>
</body>
</html>
