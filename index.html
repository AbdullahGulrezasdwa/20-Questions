<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S.T.A.R.K. // MARK XVI [ASCENSION]</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00e5ff; --bg: #020810; --gold: #ffb700; --green: #00fa9a; --red: #ff2a2a;
  --panel: rgba(0, 20, 40, 0.8);
}

body { margin: 0; background: var(--bg); color: var(--accent); font-family: 'Space Mono', monospace; overflow: hidden; }

/* ━━━━━━━━━ HOLOGRAPHIC OVERLAYS ━━━━━━━━━ */
#vignette { position: fixed; inset: 0; box-shadow: inset 0 0 150px black; pointer-events: none; z-index: 5; }
#scanlines { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,229,255,0.02) 50%); background-size: 100% 4px; pointer-events: none; z-index: 10; }

#canvas-container { position: absolute; inset: 0; z-index: 1; }

/* ━━━━━━━━━ UI COMPONENTS ━━━━━━━━━ */
.hud-frame {
  position: absolute; inset: 20px; border: 1px solid rgba(0, 229, 255, 0.1);
  pointer-events: none; z-index: 20; display: flex; flex-direction: column;
}

.header { display: flex; justify-content: space-between; padding: 10px; font-size: 0.6rem; letter-spacing: 2px; border-bottom: 1px solid rgba(0, 229, 255, 0.1); }

.log-panel {
  position: absolute; left: 20px; top: 80px; width: 200px; height: 300px;
  font-size: 0.5rem; color: rgba(0, 229, 255, 0.5); overflow: hidden;
}

.core-ui {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 450px; pointer-events: auto; text-align: center;
}

#q-card {
  background: var(--panel); border: 1px solid var(--accent); padding: 30px;
  backdrop-filter: blur(20px); box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,229,255,0.1);
  margin-bottom: 20px; transition: 0.3s;
}

.q-main { font-family: 'Outfit'; font-size: 1.6rem; font-weight: 800; color: white; margin-bottom: 10px; }
.q-meta { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; }

.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
button {
  background: rgba(0, 229, 255, 0.05); border: 1px solid var(--accent); color: var(--accent);
  padding: 15px; font-family: 'Space Mono'; font-weight: bold; cursor: pointer; transition: 0.2s;
}
button:hover { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent); }
.btn-y { border-color: var(--green); color: var(--green); }
.btn-n { border-color: var(--red); color: var(--red); }
.btn-m { grid-column: span 2; border-color: var(--gold); color: var(--gold); }

/* ━━━━━━━━━ INJECTION SYSTEM ━━━━━━━━━ */
#inject-form { display: none; flex-direction: column; gap: 8px; background: var(--panel); padding: 20px; border: 1px solid var(--gold); }
input { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); color: white; padding: 10px; font-family: 'Space Mono'; }
</style>
</head>
<body>

<div id="vignette"></div>
<div id="scanlines"></div>
<div id="canvas-container"></div>

<div class="hud-frame">
  <div class="header">
    <div>MARK_XVI // NEURAL_ASCENSION</div>
    <div id="status-tag">CORE_STABLE</div>
    <div id="conf-readout">CONF: 0.00%</div>
  </div>
  
  <div class="log-panel" id="sys-logs"></div>

  <div class="core-ui">
    <div id="q-card">
      <div id="q-meta" class="q-meta">Initializing Latent Space...</div>
      <div id="q-main" class="q-main">SYSTEM BOOT</div>
      
      <div id="inject-form">
        <input type="text" id="new-name" placeholder="TARGET IDENTITY">
        <div style="font-size: 0.6rem; margin: 10px 0;">SLIDER CONFIG (0-100)</div>
        <input type="number" id="v0" placeholder="Biological? (0-100)">
        <input type="number" id="v1" placeholder="Tech? (0-100)">
        <button onclick="commitInjection()" style="border-color:var(--gold); color:var(--gold);">INJECT DATA</button>
      </div>
    </div>

    <div class="btn-grid" id="controls">
      <button class="btn-y" onclick="process(1)">AFFIRMATIVE</button>
      <button class="btn-n" onclick="process(0)">NEGATIVE</button>
      <button class="btn-m" onclick="process(0.5)">UNCERTAIN</button>
    </div>
    
    <button id="reset-btn" style="display:none; width:100%;" onclick="location.reload()">REBOOT SYSTEM</button>
  </div>
</div>

<script>
/* ━━━━━━━━━ MULTIDIMENSIONAL KNOWLEDGE ━━━━━━━━━ */
// Dimensions: [Biological, Mechanical, Edible, Large, Mobile, Dangerous]
const BASE_KB = [
  { w: "SHELTER", v: [0, 0.1, 0, 1, 0, 0] },
  { w: "WOLF", v: [1, 0, 0, 0.4, 1, 0.8] },
  { w: "SMARTPHONE", v: [0, 1, 0, 0.1, 0, 0] },
  { w: "HAMBURGER", v: [0.2, 0, 1, 0.1, 0, 0] },
  { w: "SUBMARINE", v: [0, 1, 0, 1, 1, 0.7] },
  { w: "STORM", v: [0.1, 0, 0, 1, 1, 0.9] }
];

const DIM_LABELS = ["Biological Presence", "Mechanical Components", "Consumption Factor", "Physical Scale", "Locomotion", "Threat Level"];

let KB = JSON.parse(localStorage.getItem('stark_asc_kb')) || BASE_KB;
let beliefs = KB.map(() => 1 / KB.length);
let qCount = 0;
let currentDim = 0;

/* ━━━━━━━━━ THREE.JS NEURAL VISUALIZER ━━━━━━━━━ */
let scene, cam, renderer, nodes = [];

function initHologram() {
  scene = new THREE.Scene();
  cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  KB.forEach((item, i) => {
    const geo = new THREE.SphereGeometry(0.2, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true });
    const mesh = new THREE.Mesh(geo, mat);
    
    // Position based on Dim 0, 1, 3 (Bio, Tech, Scale)
    mesh.position.set((item.v[0]-0.5)*10, (item.v[1]-0.5)*10, (item.v[3]-0.5)*10);
    scene.add(mesh);
    nodes.push(mesh);
  });
  cam.position.z = 8;
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  nodes.forEach((n, i) => {
    n.rotation.y += 0.01;
    let b = beliefs[i] * 5;
    n.scale.set(b + 0.2, b + 0.2, b + 0.2);
    n.material.color.setHSL(0.5 + beliefs[i], 1, 0.5);
  });
  scene.rotation.y += 0.002;
  renderer.render(scene, cam);
}

/* ━━━━━━━━━ CORE LOGIC ━━━━━━━━━ */
function log(msg) {
  const p = document.getElementById('sys-logs');
  p.innerHTML = `> ${msg}<br>` + p.innerHTML;
}

function next() {
  qCount++;
  // Calculate which dimension has the most uncertainty
  let dimWeights = new Array(6).fill(0);
  KB.forEach((item, i) => {
    item.v.forEach((val, d) => {
      dimWeights[d] += val * beliefs[i];
    });
  });

  // Pick dimension closest to 0.5 (maximum ambiguity)
  currentDim = dimWeights.map((w, i) => ({d:i, v:Math.abs(0.5 - w)}))
                .sort((a,b) => a.v - b.v)[0].d;

  document.getElementById('q-main').innerText = `Scan for ${DIM_LABELS[currentDim]}?`;
  document.getElementById('q-meta').innerText = `Iteration_${qCount} // Targeting_Dim_${currentDim}`;
  log(`Analyzing Dim_${currentDim}: ${DIM_LABELS[currentDim]}`);
}

function process(val) {
  KB.forEach((item, i) => {
    let likelihood = 1.0;
    let attribute = item.v[currentDim];
    
    if (val === 1) likelihood = attribute > 0.5 ? 1.8 : 0.3;
    if (val === 0) likelihood = attribute < 0.5 ? 1.8 : 0.3;
    if (val === 0.5) likelihood = 1.0;

    beliefs[i] *= likelihood;
  });

  // Normalize
  let sum = beliefs.reduce((a,b) => a+b, 0);
  beliefs = beliefs.map(b => b/sum);

  // Stats
  let sorted = [...beliefs].sort((a,b) => b-a);
  let confidence = sorted[0] - (sorted[1] || 0);
  document.getElementById('conf-readout').innerText = `CONF: ${(confidence*100).toFixed(2)}%`;

  if (confidence > 0.9 || qCount > 15) reveal();
  else next();
}

function reveal() {
  let idx = beliefs.indexOf(Math.max(...beliefs));
  let win = beliefs[idx] > 0.6;
  
  document.getElementById('controls').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'block';
  
  if (win) {
    document.getElementById('q-main').innerHTML = `<span style="color:var(--green)">TARGET_IDENTIFIED:</span><br>${KB[idx].w}`;
    log(`Success. Entry matches ${KB[idx].w}.`);
  } else {
    document.getElementById('q-main').innerText = "SIGNATURE_CLASH.";
    document.getElementById('inject-form').style.display = 'flex';
    log(`Neural mapping failed. Awaiting manual injection.`);
  }
}

function commitInjection() {
  let name = document.getElementById('new-name').value.toUpperCase();
  let v0 = document.getElementById('v0').value / 100;
  let v1 = document.getElementById('v1').value / 100;
  
  if (!name) return;
  KB.push({ w: name, v: [v0, v1, 0.5, 0.5, 0.5, 0.5] });
  localStorage.setItem('stark_asc_kb', JSON.stringify(KB));
  location.reload();
}

window.onload = () => {
  initHologram();
  log("Neural Engine Online.");
  log("Loading Memory Sectors...");
  next();
};
</script>
</body>
</html>
