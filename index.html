<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20 Questions: Tabletop Edition</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        .game-container { display: flex; flex-direction: column; height: 100vh; }
        .side { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* Guesser Side (Top - Rotated) */
        #guesser-side { background: #2d3436; color: white; transform: rotate(180deg); border-bottom: 4px dashed #636e72; }
        
        /* Host Side (Bottom) */
        #host-side { background: #2d3436; color: white; }

        /* Secret Peek Area */
        #peek-area { background: #444; padding: 10px 20px; border-radius: 30px; margin-bottom: 20px; cursor: pointer; user-select: none; border: 1px solid #666; }
        #secret-word-display { visibility: hidden; color: #f1c40f; margin-left: 10px; font-weight: bold; }
        #peek-area:active #secret-word-display { visibility: visible; }

        /* Big Answer Text */
        #last-answer { font-size: 5.5rem; font-weight: 900; margin: 10px; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .counter-text { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }

        /* Button Grid */
        .controls { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .ans-btn { padding: 20px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.3); }
        .ans-btn:active { transform: translateY(4px); box-shadow: none; }
        
        .yes { background: #27ae60; }
        .no { background: #c0392b; }
        .maybe { background: #f39c12; }
        .win-btn { grid-column: span 3; background: #8e44ad; margin-top: 10px; font-size: 1.3rem; }

        /* Overlay Styles */
        .overlay { position: fixed; inset: 0; background: #f9f9f9; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #2d3436; }
        input { padding: 15px; width: 280px; font-size: 1.2rem; border-radius: 12px; border: 3px solid #8e44ad; margin: 20px; text-align: center; outline: none; }
        .primary-btn { background: #8e44ad; color: white; padding: 15px 50px; border: none; border-radius: 50px; font-size: 1.4rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(142, 68, 173, 0.4); }
        
        .hidden { display: none !important; }

        /* Victory Reveal Styling */
        #victory { background: #2d3436; color: white; }
        .victory-title { font-size: 1.5rem; letter-spacing: 5px; color: #27ae60; margin-bottom: 0; }
        .word-reveal { font-size: 5rem; font-weight: 900; color: #f1c40f; text-shadow: 0 0 30px rgba(241, 196, 15, 0.3); margin: 10px 0 30px 0; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="setup" class="overlay">
    <h1 style="color:#8e44ad; font-size: 3rem; margin-bottom:0;">20?</h1>
    <p>HOST: ENTER THE SECRET WORD</p>
    <input type="password" id="wordInput" placeholder="Type word here..." autocomplete="off">
    <button class="primary-btn" onclick="startGame()">LOCK IT IN</button>
</div>

<div id="victory" class="overlay hidden">
    <p class="victory-title">✨ YOU GUESSED IT! ✨</p>
    <p style="opacity:0.7;">THE SECRET WORD WAS</p>
    <div id="finalWordDisplay" class="word-reveal">APPLE</div>
    <button class="primary-btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

<div class="game-container">
    <div id="guesser-side" class="side">
        <div class="counter-text">Tries Remaining: <span class="q-val">20</span></div>
        <div id="last-answer">READY?</div>
        <p style="opacity:0.5;">Ask your question out loud</p>
    </div>

    <div id="host-side" class="side">
        <div id="peek-area">HOLD TO PEEK <span id="secret-word-display">---</span></div>
        
        <div class="controls">
            <button class="ans-btn yes" onclick="handleResponse('YES')">YES</button>
            <button class="ans-btn no" onclick="handleResponse('NO')">NO</button>
            <button class="ans-btn maybe" onclick="handleResponse('MAYBE')">MAYBE</button>
            <button class="ans-btn win-btn" onclick="winGame()">🏆 YOU GOT IT!</button>
        </div>
        
        <div class="counter-text" style="margin-top: 25px;">Tries Remaining: <span class="q-val">20</span></div>
    </div>
</div>

<script>
    let count = 20;
    let secretWord = "";

    function startGame() {
        const input = document.getElementById('wordInput');
        if(!input.value) return alert("Please enter a word first!");
        
        secretWord = input.value.trim();
        document.getElementById('secret-word-display').innerText = secretWord;
        document.getElementById('finalWordDisplay').innerText = secretWord;
        document.getElementById('setup').classList.add('hidden');
    }

    function handleResponse(ans) {
        if(count <= 0) return;
        
        count--;
        document.querySelectorAll('.q-val').forEach(el => el.innerText = count);
        
        const display = document.getElementById('last-answer');
        display.innerText = ans;
        
        // Color update
        if(ans === 'YES') display.style.color = '#2ecc71';
        else if(ans === 'NO') display.style.color = '#e74c3c';
        else display.style.color = '#f39c12';

        if(count === 0) {
            display.innerText = "GAME OVER";
            display.style.color = "#bdc3c7";
        }
    }

    function winGame() {
        document.getElementById('victory').classList.remove('hidden');
    }
</script>

</body>
</html>
