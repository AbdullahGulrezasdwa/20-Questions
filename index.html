<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.T.A.R.K. V2 // ADAPTIVE INTEL</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Space+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#00f2ff;
  --bg:#020611;
  --surf:#071a2d;
  --gold:#ffcc00;
  --green:#2dd4a0;
  --red:#ff3e3e;
}

body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HUD */
.hud{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  font-family:'Space Mono';
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* Screen */
.screen{
  display:none;
  flex:1;
  padding:20px;
}
.active{display:flex;flex-direction:column;}

.card{
  flex:1;
  background:var(--surf);
  padding:25px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

/* Buttons */
button{
  padding:14px;
  margin:6px 0;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  cursor:pointer;
}
button:hover{
  background:var(--accent);
  color:black;
}

/* Answers */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.y{border-color:var(--green);color:var(--green);}
.n{border-color:var(--red);color:var(--red);}
.m{
  grid-column:span 2;
  border-color:var(--gold);
  color:var(--gold);
}

/* Text */
.big{
  font-size:2rem;
  text-align:center;
  margin:30px 0;
}

/* Bars */
.bar{
  height:5px;
  background:#222;
}
.fill{
  height:100%;
  background:var(--gold);
  width:0%;
  transition:.3s;
}

.conf{
  height:4px;
  background:var(--green);
  margin-top:6px;
  width:0%;
}

/* Toast */
#toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--accent);
  color:black;
  padding:6px 14px;
  display:none;
}
</style>
</head>

<body>

<div class="hud">
  <div>LVL <span id="lvl">1</span></div>
  <div id="status">ADAPTIVE CORE</div>
</div>

<div id="toast"></div>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="card">
    <h1>S.T.A.R.K.</h1>
    <div class="bar"><div id="xpbar" class="fill"></div></div>
    <button onclick="start()">START</button>
    <button onclick="show('stats')">STATS</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="card">
    <div id="count">01/20</div>

    <div id="q" class="big">...</div>

    <div class="bar"><div id="confidence" class="conf"></div></div>

    <div class="grid">
      <button class="y" onclick="ans(1)">YES</button>
      <button class="n" onclick="ans(0)">NO</button>
      <button class="m" onclick="ans(0.5)">MAYBE</button>
    </div>

    <button id="restart" onclick="location.reload()" style="display:none;">MENU</button>
  </div>
</div>

<!-- LEARN -->
<div id="learn" class="screen">
  <div class="card">
    <h2>AI LEARNING MODE</h2>
    <input id="newWord" placeholder="What was your object?">
    <input id="newTag" placeholder="Give ONE keyword (e.g. furry, metal)">
    <button onclick="saveNew()">SAVE</button>
  </div>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <div class="card">
    <h2>DATA</h2>
    <p>Wins: <span id="wins"></span></p>
    <p>XP: <span id="xp"></span></p>
    <button onclick="show('menu')">BACK</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>

/* ━━━━━━━━━━━ KNOWLEDGE BASE ━━━━━━━━━━━ */
let KB = JSON.parse(localStorage.getItem('stark_kb')) || [
  {w:"DOG",t:["alive","pet","furry"]},
  {w:"CAR",t:["object","metal","fast"]},
  {w:"PHONE",t:["object","electronic","small"]},
  {w:"PIZZA",t:["food","edible","round"]}
];

let MEMORY = JSON.parse(localStorage.getItem('stark_memory')) || [];

/* QUESTIONS */
const QUESTIONS = [
  {q:"Is it alive?",t:"alive"},
  {q:"Is it an object?",t:"object"},
  {q:"Is it edible?",t:"food"},
  {q:"Does it use electricity?",t:"electronic"},
  {q:"Is it furry?",t:"furry"},
  {q:"Is it fast?",t:"fast"},
  {q:"Is it small?",t:"small"},
  {q:"Is it man-made?",t:"metal"}
];

/* STATE */
let S = {
  scores: [],
  asked: [],
  qNum: 1,
  currentTag: "",
  xp: +localStorage.stark_xp || 0,
  wins: +localStorage.stark_wins || 0,
  peer: null,
  conn: null,
  multiplayer: false
};

/* ━━━━━━━━━━━ START ━━━━━━━━━━━ */
function start() {
  S.scores = KB.map(() => 1);
  S.asked = [];
  S.qNum = 1;

  document.getElementById('status').innerText = "SCANNING";
  resetRing();

  show("game");
  next();
}

/* ━━━━━━━━━━━ QUESTION SELECTION (INFO GAIN) ━━━━━━━━━━━ */
function next() {
  if(S.qNum > 20) return reveal();

  let best = null;
  let bestEntropy = -Infinity;

  QUESTIONS.forEach(q => {
    if(S.asked.includes(q.t)) return;

    let yes = 0, no = 0;

    KB.forEach((obj,i)=>{
      if(obj.t.includes(q.t)) yes += S.scores[i];
      else no += S.scores[i];
    });

    let total = yes + no;
    if(total === 0) return;

    let pYes = yes / total;
    let pNo = no / total;

    let entropy = -(pYes*Math.log2(pYes||1) + pNo*Math.log2(pNo||1));

    if(entropy > bestEntropy){
      bestEntropy = entropy;
      best = q;
    }
  });

  if(!best) return reveal();

  S.currentTag = best.t;

  q_text.innerText = best.q;
  count.innerText = String(S.qNum).padStart(2,"0") + "/20";

  updateStatus();
}

/* ━━━━━━━━━━━ ANSWER HANDLER (WEIGHTED AI) ━━━━━━━━━━━ */
function ans(v) {
  S.asked.push(S.currentTag);

  KB.forEach((obj,i)=>{
    let has = obj.t.includes(S.currentTag);

    if(v === 1){
      S.scores[i] *= has ? 1.5 : 0.3;
    }
    else if(v === 0){
      S.scores[i] *= has ? 0.3 : 1.5;
    }
    else{
      S.scores[i] *= has ? 1.1 : 0.9;
    }
  });

  normalizeScores();
  updateConfidence();

  if(S.multiplayer && S.conn){
    S.conn.send({type:"answer", value:v});
  }

  S.qNum++;
  next();
}

/* NORMALIZE */
function normalizeScores(){
  let max = Math.max(...S.scores);
  if(max === 0) return;
  S.scores = S.scores.map(s => s / max);
}

/* ━━━━━━━━━━━ CONFIDENCE SYSTEM ━━━━━━━━━━━ */
function updateConfidence(){
  let max = Math.max(...S.scores);
  let second = [...S.scores].sort((a,b)=>b-a)[1] || 0;

  let confidence = max - second;

  conf_ring.style.strokeDashoffset = 440 - (440 * confidence);
}

/* ━━━━━━━━━━━ REVEAL ━━━━━━━━━━━ */
function reveal(){
  let bestIndex = S.scores.indexOf(Math.max(...S.scores));
  let guess = KB[bestIndex]?.w || "UNKNOWN";

  q_text.innerHTML = `<span style="color:var(--accent)">TARGET LOCK:</span><br>${guess}`;

  document.getElementById('controls').style.display = "none";
  document.getElementById('restart').style.display = "block";

  if(Math.max(...S.scores) > 0.8){
    awardWin();
  } else {
    MEMORY.push({failed:true, time:Date.now()});
    localStorage.setItem('stark_memory', JSON.stringify(MEMORY));
  }

  document.getElementById('status').innerText = "LOCKED";
}

/* ━━━━━━━━━━━ MULTIPLAYER ━━━━━━━━━━━ */
function hostGame(){
  S.peer = new Peer();
  S.peer.on('open', id=>{
    notify("HOST ID: " + id);
  });

  S.peer.on('connection', conn=>{
    S.conn = conn;
    S.multiplayer = true;

    conn.on('data', data=>{
      if(data.type==="answer"){
        ans(data.value);
      }
    });
  });
}

function joinGame(id){
  S.peer = new Peer();

  S.conn = S.peer.connect(id);
  S.multiplayer = true;

  S.conn.on('open', ()=>{
    notify("CONNECTED");
  });
}

/* ━━━━━━━━━━━ SYSTEM ━━━━━━━━━━━ */
function awardWin(){
  S.xp += 50;
  S.wins++;

  localStorage.stark_xp = S.xp;
  localStorage.stark_wins = S.wins;

  updateHUD();
  notify("+50 XP");
}

function updateHUD(){
  let lvl = Math.floor(S.xp/500)+1;

  lvl_display.innerText = lvl;
  xp_bar.style.width = (S.xp%500)/5 + "%";

  wins_display.innerText = S.wins;
  xp_display.innerText = S.xp;
}

function updateStatus(){
  if(S.qNum < 5) status.innerText = "SCANNING";
  else if(S.qNum < 12) status.innerText = "NARROWING";
  else status.innerText = "TARGETING";
}

function resetRing(){
  conf_ring.style.strokeDashoffset = 440;
}

function notify(msg){
  toast.innerText = "[SYS]: " + msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2500);
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function clearMemory(){
  if(confirm("WIPE ALL DATA?")){
    localStorage.clear();
    location.reload();
  }
}

/* INIT */
updateHUD();

</script>

</body>
</html>
