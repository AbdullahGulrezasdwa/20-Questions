<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S.T.A.R.K. // OMNI-INTEL</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00f2ff; --bg: #01080f; --surf: #051625;
  --gold: #ffcc00; --red: #ff3e3e; --green: #2dd4a0;
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* THEMES */
body.theme-stark { --accent: #ff3e3e; --bg: #0f0101; --surf: #250505; }
body.theme-stealth { --accent: #ffffff; --bg: #000000; --surf: #111111; }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); color: #e1f5fe; font-family: 'Outfit', sans-serif;
  height: 100vh; overflow: hidden; position: relative; transition: 0.5s;
}

/* STARK HUD OVERLAY */
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1000;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px);
}

#app { max-width: 500px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; padding: 20px; z-index: 5; position: relative; }

.hud-bar {
  display: flex; justify-content: space-between; padding: 12px;
  border: 1px solid rgba(0, 242, 255, 0.2); margin-bottom: 15px; background: rgba(5, 22, 37, 0.6);
}

.screen { display: none; flex-direction: column; flex: 1; animation: slideUp 0.4s var(--spring); }
.active { display: flex; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.card {
  background: var(--surf); border: 1px solid rgba(0, 242, 255, 0.1);
  padding: 25px; border-radius: 4px; flex: 1; position: relative; overflow-y: auto;
}

/* BUTTONS */
button {
  background: rgba(0, 242, 255, 0.05); border: 1px solid var(--accent);
  color: var(--accent); padding: 14px; font-family: 'Space Mono';
  font-weight: bold; text-transform: uppercase; cursor: pointer; margin: 5px 0;
}
button:hover { background: var(--accent); color: var(--bg); }

/* LEADERBOARD UI */
.lb-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; }
.xp-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin: 10px 0; }
#xp-fill { height: 100%; background: var(--gold); transition: 1s; }

#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: var(--bg); padding: 8px 15px;
  font-family: 'Space Mono'; font-size: 0.7rem; z-index: 9999; display: none;
}
</style>
</head>
<body class="theme-default">

<div id="toast">SYSTEM NOTIFY</div>

<div id="app">
  <div class="hud-bar">
    <div style="font-family:'Space Mono'; font-size:0.7rem;">LVL <span id="lvl-num">1</span></div>
    <div id="status-tag" style="color:var(--accent); font-size:0.7rem; font-weight:800;">JARVIS_ACTIVE</div>
  </div>

  <div id="menu-screen" class="screen active">
    <div class="card">
      <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -2px;">S.T.A.R.K.</h1>
      <div class="xp-bar"><div id="xp-fill" style="width: 0%"></div></div>
      <p id="rank-text" style="font-size: 0.6rem; color: var(--gold); margin-bottom: 20px;">RANK: RECRUIT</p>
      
      <button onclick="startSolo()" style="width:100%;">Initiate Simulation (Solo)</button>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button onclick="switchScreen('lb-screen')">Ranks</button>
        <button onclick="switchScreen('settings-screen')">Settings</button>
      </div>
      <button onclick="switchScreen('multi-screen')" style="width:100%; margin-top:10px; border-style:dashed;">Multiplayer Uplink</button>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="card" style="display:flex; flex-direction:column; justify-content:center; text-align:center;">
      <div id="q-count" style="font-family:'Space Mono'; color:var(--accent); margin-bottom:20px;">01/20</div>
      <h2 id="q-text" style="font-size: 1.8rem; margin-bottom: 40px;">...</h2>
      
      <div id="game-btns" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button onclick="processAnswer(1)" style="border-color:var(--green); color:var(--green);">YES</button>
        <button onclick="processAnswer(0)" style="border-color:var(--red); color:var(--red);">NO</button>
        <button onclick="processAnswer(0.5)" style="grid-column: span 2; border-color:var(--gold); color:var(--gold);">MAYBE / SOMETIMES</button>
      </div>
      <button id="reset-btn" style="display:none; margin-top:20px;" onclick="location.reload()">Return to Menu</button>
    </div>
  </div>

  <div id="lb-screen" class="screen">
    <div class="card">
      <h2 style="margin-bottom:20px;">GLOBAL_STATS</h2>
      <div id="lb-content">
        </div>
      <button onclick="switchScreen('menu-screen')" style="margin-top:20px;">Close</button>
    </div>
  </div>

  <div id="settings-screen" class="screen">
    <div class="card">
      <h2 style="margin-bottom:20px;">HUD_CONFIG</h2>
      <label style="font-size:0.7rem; color:var(--accent);">VISUAL THEME</label>
      <select id="theme-select" onchange="changeTheme()" style="width:100%; padding:10px; background:var(--bg); color:white; border:1px solid var(--accent); margin:10px 0;">
        <option value="default">CYBER BLUE</option>
        <option value="stark">STARK RED</option>
        <option value="stealth">STEALTH BLACK</option>
      </select>
      <button onclick="clearData()" style="width:100%; border-color:var(--red); color:var(--red); font-size:0.6rem;">Wipe All Data</button>
      <button onclick="switchScreen('menu-screen')" style="margin-top:auto;">Save & Exit</button>
    </div>
  </div>
</div>

<script>
/* ━━━━━━━━ ENHANCED DATA ━━━━━━━━ */
const KB = [
  { w: "DOG", t: ["alive", "pet", "furry", "bark", "mammal"] },
  { w: "CAT", t: ["alive", "pet", "furry", "meow", "mammal"] },
  { w: "HAMSTER", t: ["alive", "pet", "furry", "small", "mammal"] },
  { w: "LION", t: ["alive", "wild", "furry", "huge", "mammal"] },
  { w: "EAGLE", t: ["alive", "wild", "feathers", "fly", "bird"] },
  { w: "SHARK", t: ["alive", "wild", "water", "scary", "fish"] },
  { w: "CAR", t: ["object", "metal", "transport", "wheels", "fast"] },
  { w: "PHONE", t: ["object", "electronic", "small", "screen", "pocket"] },
  { w: "PIZZA", t: ["edible", "round", "cheese", "hot", "food"] },
  { w: "CAKE", t: ["edible", "sweet", "celebration", "food"] },
  // ... Imagine 500+ entries here
];

const QUESTIONS = [
  { q: "Is it a living organism?", t: "alive" },
  { q: "Is it an inanimate object?", t: "object" },
  { q: "Can it fly?", t: "fly" },
  { q: "Does it live in water?", t: "water" },
  { q: "Is it an electronic device?", t: "electronic" },
  { q: "Is it bigger than a human?", t: "huge" },
  { q: "Is it something you can eat?", t: "edible" },
  { q: "Does it have fur?", t: "furry" }
];

let state = {
  candidates: [],
  asked: [],
  qIndex: 1,
  currentTag: "",
  xp: parseInt(localStorage.getItem('stark_xp')) || 0,
  wins: parseInt(localStorage.getItem('stark_wins')) || 0
};

/* ━━━━━━━━ GAME LOGIC ━━━━━━━━ */
function startSolo() {
  state.candidates = [...KB];
  state.asked = [];
  state.qIndex = 1;
  switchScreen('game-screen');
  updateHUD();
  nextQ();
}

function nextQ() {
  // BOT IMPROVEMENT: Don't guess too early!
  // If only one candidate left OR 20 questions reached
  if (state.candidates.length === 1 || state.qIndex > 20) {
    reveal();
    return;
  }

  // Find best question (Splits candidates in half most effectively)
  let bestQ = null;
  let bestScore = Infinity;

  QUESTIONS.forEach(q => {
    if (state.asked.includes(q.t)) return;
    let yesCount = state.candidates.filter(c => c.t.includes(q.t)).length;
    let score = Math.abs(yesCount - (state.candidates.length / 2));
    if (score < bestScore) {
      bestScore = score;
      bestQ = q;
    }
  });

  if (bestQ) {
    state.currentTag = bestQ.t;
    document.getElementById('q-text').innerText = bestQ.q;
    document.getElementById('q-count').innerText = `${state.qIndex.toString().padStart(2, '0')}/20`;
  } else {
    reveal();
  }
}

function processAnswer(val) {
  state.asked.push(state.currentTag);
  
  if (val === 1) {
    state.candidates = state.candidates.filter(c => c.t.includes(state.currentTag));
  } else if (val === 0) {
    state.candidates = state.candidates.filter(c => !c.t.includes(state.currentTag));
  }
  
  state.qIndex++;
  nextQ();
}

function reveal() {
  const result = state.candidates.length > 0 ? state.candidates[0].w : "OUTSIDE MY DATABASE";
  document.getElementById('q-text').innerHTML = `ANALYSIS COMPLETE:<br><span style="color:var(--accent)">${result}</span>`;
  document.getElementById('game-btns').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'block';
  
  if(state.candidates.length > 0) {
    addXP(50);
    state.wins++;
    localStorage.setItem('stark_wins', state.wins);
  }
}

/* ━━━━━━━━ SYSTEM ━━━━━━━━ */
function addXP(amt) {
  state.xp += amt;
  localStorage.setItem('stark_xp', state.xp);
  updateHUD();
  notify(`+${amt} XP EARNED`);
}

function updateHUD() {
  const lvl = Math.floor(state.xp / 500) + 1;
  const progress = ((state.xp % 500) / 500) * 100;
  document.getElementById('lvl-num').innerText = lvl;
  document.getElementById('xp-fill').style.width = progress + "%";
  
  const ranks = ["INTERN", "RECRUIT", "AGENT", "AVENGER", "DIRECTOR"];
  document.getElementById('rank-text').innerText = `RANK: ${ranks[Math.min(lvl-1, 4)]}`;

  // Update Leaderboard Screen
  document.getElementById('lb-content').innerHTML = `
    <div class="lb-row"><span>WINS</span><span>${state.wins}</span></div>
    <div class="lb-row"><span>TOTAL XP</span><span>${state.xp}</span></div>
    <div class="lb-row"><span>CLEARANCE</span><span>LVL ${lvl}</span></div>
  `;
}

function changeTheme() {
  const theme = document.getElementById('theme-select').value;
  document.body.className = 'theme-' + theme;
  localStorage.setItem('stark_theme', theme);
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function notify(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

function clearData() {
  if(confirm("Factory reset all HUD data?")) {
    localStorage.clear();
    location.reload();
  }
}

// Init
window.onload = () => {
  updateHUD();
  const savedTheme = localStorage.getItem('stark_theme');
  if(savedTheme) {
    document.body.className = 'theme-' + savedTheme;
    document.getElementById('theme-select').value = savedTheme;
  }
};
</script>
</body>
</html>
