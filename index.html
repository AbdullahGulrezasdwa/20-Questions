<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20 Questions: Pro Edition</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #8b5cf6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6; /* Color for Depends */
            --text: #f8fafc;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; background: var(--bg); color: var(--text);
            user-select: none; -webkit-user-select: none;
        }

        .game-container { display: flex; flex-direction: column; height: 100vh; }

        .side { 
            flex: 1; padding: 20px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative;
        }

        #guesser-side { 
            background: linear-gradient(to bottom, #1e1b4b, #0f172a);
            transform: rotate(180deg);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        #host-side { background: linear-gradient(to top, #111827, #0f172a); }

        /* Anti-Selection Peek Area */
        #peek-area { 
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 24px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; margin-bottom: 20px;
            -webkit-touch-callout: none;
        }

        #secret-word-display { 
            display: none; color: var(--warning); 
            font-weight: 800; margin-left: 10px;
            pointer-events: none;
        }
        #peek-area:active #secret-word-display { display: inline; }

        #last-answer { 
            font-size: 4.5rem; font-weight: 900; margin: 10px;
            text-transform: uppercase; letter-spacing: -2px;
            text-align: center;
        }

        .counter-badge {
            background: rgba(139, 92, 246, 0.1);
            color: var(--accent); padding: 6px 16px;
            border-radius: 20px; font-weight: bold;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Responsive Grid for 4 buttons + Win button */
        .controls { width: 95%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ans-btn { 
            padding: 16px; border: none; border-radius: 12px; 
            font-size: 1rem; font-weight: 700; cursor: pointer; color: white;
            transition: transform 0.1s;
        }
        .ans-btn:active { transform: scale(0.95); }
        
        .yes { background: var(--success); }
        .no { background: var(--danger); }
        .maybe { background: var(--warning); }
        .depends { background: var(--info); }
        
        .full-width { grid-column: span 2; }
        .win-btn { background: var(--accent); margin-top: 5px; }
        .undo-btn { background: transparent; border: 1px solid #334155; color: #64748b; font-size: 0.8rem; padding: 8px; margin-top: 10px; }

        /* Overlays */
        .overlay { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
        }
        
        input { 
            background: var(--card); border: 2px solid #334155;
            color: white; padding: 18px; width: 260px; 
            border-radius: 16px; font-size: 1.2rem; margin: 20px; text-align: center;
        }
        
        .primary-btn { background: var(--accent); color: white; padding: 16px 40px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }

        .hidden { display: none !important; }
        .word-reveal { font-size: 4.5rem; font-weight: 900; color: var(--text); margin: 15px 0; text-transform: uppercase; color: var(--warning); }
    </style>
</head>
<body>

<div id="setup" class="overlay">
    <h1 style="color: var(--accent); font-size: 3rem;">20?</h1>
    <input type="password" id="wordInput" placeholder="Enter Secret Word" autocomplete="off">
    <button class="primary-btn" onclick="startGame()">START GAME</button>
</div>

<div id="victory" class="overlay hidden">
    <p style="color: var(--success); font-weight: bold; letter-spacing: 2px;">GUESS COMPLETED</p>
    <div id="finalWordDisplay" class="word-reveal">---</div>
    <button class="primary-btn" onclick="location.reload()">NEW ROUND</button>
</div>

<div class="game-container">
    <div id="guesser-side" class="side">
        <div class="counter-badge">CHANCES: <span class="q-val">20</span></div>
        <div id="last-answer" style="color: #334155;">READY</div>
    </div>

    <div id="host-side" class="side">
        <div id="peek-area">
            <span style="opacity:0.5; font-size: 0.8rem;">HOLD TO PEEK:</span>
            <span id="secret-word-display">NONE</span>
        </div>
        
        <div class="controls">
            <button class="ans-btn yes" onclick="handleResponse('YES', '#22c55e')">YES</button>
            <button class="ans-btn no" onclick="handleResponse('NO', '#ef4444')">NO</button>
            <button class="ans-btn maybe" onclick="handleResponse('MAYBE', '#f59e0b')">MAYBE</button>
            <button class="ans-btn depends" onclick="handleResponse('DEPENDS', '#3b82f6')">DEPENDS</button>
            <button class="ans-btn win-btn full-width" onclick="winGame()">🏆 YOU GOT IT!</button>
        </div>
        
        <button class="ans-btn undo-btn full-width" onclick="undoLast()">Undo Last Answer</button>
        <div class="counter-badge" style="margin-top: 15px;">TRIES LEFT: <span class="q-val">20</span></div>
    </div>
</div>

<script>
    let count = 20;
    let secret = "";
    let history = [];

    function startGame() {
        const input = document.getElementById('wordInput');
        if(!input.value) return;
        secret = input.value.trim();
        document.getElementById('secret-word-display').innerText = secret;
        document.getElementById('finalWordDisplay').innerText = secret;
        document.getElementById('setup').classList.add('hidden');
    }

    function handleResponse(ans, color) {
        if(count <= 0) return;
        
        // Save state for undo
        history.push({ans: document.getElementById('last-answer').innerText, color: document.getElementById('last-answer').style.color});
        
        count--;
        updateDisplays(ans, color);
    }

    function undoLast() {
        if(count >= 20) return;
        count++;
        const prev = history.pop() || {ans: "READY", color: "#334155"};
        updateDisplays(prev.ans, prev.color);
    }

    function updateDisplays(ans, color) {
        document.querySelectorAll('.q-val').forEach(el => el.innerText = count);
        const display = document.getElementById('last-answer');
        display.innerText = ans;
        display.style.color = color;
    }

    function winGame() {
        document.getElementById('victory').classList.remove('hidden');
    }
</script>

</body>
</html>
