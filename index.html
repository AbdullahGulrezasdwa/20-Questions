<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20? BOUTIQUE EDITION</title>
    <style>
        :root {
            --bg: #020617; --card: rgba(15, 23, 42, 0.9);
            --accent: #c084fc; --success: #22c55e; --danger: #ef4444;
            --warning: #f59e0b; --info: #3b82f6; --text: #f8fafc;
            --grad: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }

        /* THEMES */
        .theme-sunset { --bg: #450a0a; --accent: #fbbf24; --grad: linear-gradient(135deg, #7c2d12 0%, #450a0a 100%); }
        .theme-ocean { --bg: #083344; --accent: #22d3ee; --grad: linear-gradient(135deg, #164e63 0%, #083344 100%); }
        .theme-void { --bg: #000000; --accent: #ffffff; --grad: linear-gradient(180deg, #111 0%, #000 100%); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100dvh; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }

        .game-container { display: flex; flex-direction: column; height: 100dvh; background: var(--grad); transition: 0.5s; }
        .side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; }
        #guesser-side { transform: rotate(180deg); border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }

        /* THE "THIN" ORIGINAL FONT STYLE */
        #last-ans { 
            font-size: 4.2rem; 
            font-weight: 300; /* Thin weight */
            letter-spacing: 2px; 
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        /* BUTTONS */
        .btn { border: none; border-radius: 18px; font-weight: 700; color: white; cursor: pointer; transition: 0.2s; touch-action: manipulation; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.94); filter: brightness(1.2); }
        .yes { background: var(--success); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2); }
        .no { background: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); }
        .util { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); }
        .host-prime { background: var(--accent); color: #000; font-size: 1.2rem; padding: 20px 45px; border-radius: 50px; font-weight: 900; }

        /* OVERLAYS */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; transition: 0.4s; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .card { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        /* SHOP GRID */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 50vh; overflow-y: auto; padding-right: 5px; }
        .shop-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .shop-item span { display: block; font-size: 0.7rem; opacity: 0.6; margin-top: 4px; }

        /* RING */
        .ring-svg { width: 90px; height: 90px; transform: rotate(-90deg); }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 6; }
        .ring-fill { fill: none; stroke: var(--accent); stroke-width: 6; stroke-dasharray: 251; stroke-dashoffset: 0; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); stroke-linecap: round; }

        input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px; border-radius: 15px; font-size: 16px; text-align: center; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body id="b">

<div id="m-menu" class="overlay">
    <div style="font-size: 0.8rem; color: var(--accent); font-weight: 900; letter-spacing: 3px;" id="p-title">THE NOVICE</div>
    <h1 style="font-size: 5.5rem; margin: 0; letter-spacing: -7px; color: var(--text);">20?</h1>
    <div style="margin: 20px 0; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px;">
        <span id="p-av" style="font-size: 1.5rem;">👤</span>
        <span style="font-weight: 800; opacity: 0.8;">💰 <span id="p-co">0</span> | LVL <span id="p-lv">1</span></span>
    </div>
    <button class="btn host-prime" onclick="view('d-dash')">HOST SESSION</button>
    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button class="btn util" style="padding: 15px 30px" onclick="view('sh-shop')">🛒 SHOP</button>
        <button class="btn util" style="padding: 15px" onclick="cycleTheme()">🎨</button>
    </div>
</div>

<div id="sh-shop" class="overlay hidden">
    <div class="card">
        <h2 style="margin:0;">BOUTIQUE</h2>
        <p style="margin:0; font-size: 0.9rem; opacity: 0.7;">Wallet: 💰 <span id="sh-co">0</span></p>
        <div class="shop-grid">
            <div class="shop-item" onclick="buy('av', '🥷', 50)">🥷 <span>NINJA (50)</span></div>
            <div class="shop-item" onclick="buy('av', '👾', 50)">👾 <span>INVADER (50)</span></div>
            <div class="shop-item" onclick="buy('av', '👑', 200)">👑 <span>ROYAL (200)</span></div>
            <div class="shop-item" onclick="buy('av', '💎', 500)">💎 <span>LEGEND (500)</span></div>
            <div class="shop-item" onclick="buy('th', 'sunset', 100)">🌅 <span>SUNSET (100)</span></div>
            <div class="shop-item" onclick="buy('th', 'ocean', 100)">🌊 <span>OCEAN (100)</span></div>
            <div class="shop-item" onclick="buy('th', 'void', 300)">🌑 <span>VOID (300)</span></div>
            <div class="shop-item" onclick="buy('ti', 'THE ORACLE', 150)">📜 <span>ORACLE (150)</span></div>
            <div class="shop-item" onclick="buy('ti', 'MIND READER', 250)">🧠 <span>READER (250)</span></div>
            <div class="shop-item" onclick="buy('ti', 'GRANDMASTER', 1000)">🏆 <span>GM (1000)</span></div>
        </div>
        <button class="btn no" style="padding:15px;" onclick="view('m-menu')">CLOSE</button>
    </div>
</div>

<div id="d-dash" class="overlay hidden">
    <div class="card">
        <h2 style="margin:0; text-align:center; letter-spacing: 2px;">HOST SETUP</h2>
        <input type="password" id="wIn" placeholder="SECRET WORD" oninput="document.getElementById('wLen').innerText = this.value.length">
        <div style="text-align:center; font-size: 0.7rem; opacity: 0.5;">LENGTH: <span id="wLen">0</span> CHARS</div>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <span style="font-size:0.7rem; opacity:0.7">TURNS:</span>
            <input type="number" id="qIn" value="20" min="1" max="99">
        </div>
        <button class="btn yes" style="padding:20px; font-size:1.1rem;" onclick="launch()">START SESSION</button>
        <button class="btn util" onclick="view('m-menu')">BACK</button>
    </div>
</div>

<div id="v-win" class="overlay hidden">
    <h1 id="win-t" style="font-size: 3rem; margin:0;">-</h1>
    <h2 id="win-w" style="font-size: 4rem; color: var(--accent); margin: 10px 0; font-weight: 300;">-</h2>
    <p id="win-r" style="font-weight:bold; opacity:0.6;"></p>
    <button class="btn yes" style="padding: 20px 60px;" onclick="location.reload()">PLAY AGAIN</button>
</div>

<div class="game-container">
    <div id="guesser-side" class="side">
        <div style="position: relative;">
            <svg class="ring-svg"><circle class="ring-bg" cx="45" cy="45" r="40"/><circle id="r-fill" class="ring-fill" cx="45" cy="45" r="40"/></svg>
            <div style="position:absolute; inset:0; display:flex; justify-content:center; align-items:center; font-size:1.5rem; font-weight:300;" id="q-val">20</div>
        </div>
        <div style="margin-top: 20px; text-align: center;">
            <div id="h-lab" style="font-size: 0.7rem; color: var(--accent); font-weight: 900; min-height:1rem; letter-spacing: 1px;"></div>
            <div id="bl" style="letter-spacing: 5px; font-weight: 900; font-size: 1.4rem; margin-top:5px; opacity:0.8;"></div>
        </div>
        <div id="last-ans">READY</div>
    </div>

    <div id="host-side" class="side">
        <div id="pk-btn" style="padding: 10px 25px; border-radius: 50px; border: 1px solid var(--accent); margin-bottom: 20px; font-size: 0.8rem; font-weight: 900; cursor: pointer; opacity: 0.6;" 
             onmousedown="pk(1)" onmouseup="pk(0)" ontouchstart="pk(1)" ontouchend="pk(0)">
            HOLD: <span id="pk-w" style="opacity:0; color:var(--warning)">-</span>
        </div>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 92%; max-width: 420px;">
            <button class="btn yes" style="height:60px" onclick="hit('YES', 'var(--success)')">YES</button>
            <button class="btn no" style="height:60px" onclick="hit('NO', 'var(--danger)')">NO</button>
            <button class="btn util" style="height:60px; color:var(--warning)" onclick="hit('MAYBE', 'var(--warning)')">MAY</button>
            <button class="btn util" style="height:60px; color:var(--info)" onclick="hit('DEP.', 'var(--info)')">DEP.</button>
            
            <button class="btn yes" style="grid-column: span 3; height: 70px; font-size: 1.3rem; font-weight: 900;" onclick="finish(1)">🏆 GUESSED!</button>
            <button class="btn util" onclick="addHint()">HINT</button>
            
            <button class="btn util" style="grid-column: span 2; height: 50px;" onclick="undo()">UNDO</button>
            <button class="btn util" style="grid-column: span 2; height: 50px;" onclick="location.reload()">EXIT</button>
        </div>
    </div>
</div>

<script>
    const def = { xp: 0, lvl: 1, co: 0, th: 'cyber', av: '👤', ti: 'THE NOVICE', inv: ['👤', 'THE NOVICE'] };
    let st = JSON.parse(localStorage.getItem('20q-boutique')) || def;
    let cur, tot, sec = "", hist = [];

    function save() { 
        localStorage.setItem('20q-boutique', JSON.stringify(st)); 
        document.getElementById('p-lv').innerText = st.lvl;
        document.getElementById('p-co').innerText = st.co;
        document.getElementById('sh-co').innerText = st.co;
        document.getElementById('p-av').innerText = st.av;
        document.getElementById('p-title').innerText = st.ti;
    }

    function view(id) { 
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); 
        if(id !== 'none') document.getElementById(id).classList.remove('hidden'); 
    }

    function cycleTheme() {
        const ths = ['cyber', 'sunset', 'ocean', 'void'];
        st.th = ths[(ths.indexOf(st.th) + 1) % ths.length];
        applyTheme(); save();
    }

    function applyTheme() { document.body.className = st.th === 'cyber' ? '' : 'theme-' + st.th; }

    function buy(type, val, price) {
        if(st.inv.includes(val)) { st[type] = val; save(); applyTheme(); return; }
        if(st.co >= price) {
            st.co -= price; st.inv.push(val); st[type] = val;
            save(); applyTheme(); alert("Unlocked!");
        } else alert("Need more coins!");
    }

    function launch() {
        sec = document.getElementById('wIn').value.trim().toUpperCase();
        if(!sec) return alert("Word needed!");
        tot = parseInt(document.getElementById('qIn').value) || 20;
        cur = tot;
        document.getElementById('pk-w').innerText = sec;
        document.getElementById('win-w').innerText = sec;
        document.getElementById('bl').innerText = sec.replace(/[A-Z]/g, "_ ");
        view('none'); upd();
    }

    function hit(a, c) {
        if(cur <= 0) return;
        hist.push({a: document.getElementById('last-ans').innerText, c: document.getElementById('last-ans').style.color, cur, h: document.getElementById('h-lab').innerText});
        cur--;
        if(cur <= 8) document.getElementById('h-lab').innerText = "CLUE: STARTS WITH " + sec[0];
        upd(a, c);
        if(cur === 0 && a !== 'YES') finish(0);
    }

    function upd(a="READY", c="white") {
        document.getElementById('q-val').innerText = cur;
        const l = document.getElementById('last-ans');
        l.innerText = a; l.style.color = c;
        document.getElementById('r-fill').style.strokeDashoffset = 251 - (251 * (cur / tot));
    }

    function undo() {
        if(!hist.length) return;
        const p = hist.pop();
        cur = p.cur;
        document.getElementById('h-lab').innerText = p.h;
        upd(p.a, p.c);
    }

    function addHint() {
        if(cur < 5) return alert("Costs 5!");
        let h = prompt("Hint:");
        if(h) { cur -= 5; document.getElementById('h-lab').innerText = "HINT: " + h.toUpperCase(); upd("HINT", "var(--accent)"); }
    }

    function pk(v) { document.getElementById('pk-w').style.opacity = v ? 1 : 0; }

    function finish(w) {
        const t = document.getElementById('win-t');
        if(w) {
            t.innerText = "VICTORY"; t.style.color = "var(--success)";
            st.co += 30; st.xp += 50; if(st.xp >= st.lvl*100) { st.lvl++; st.xp=0; }
            document.getElementById('win-r').innerText = "+30 COINS | +50 XP";
        } else {
            t.innerText = "DEFEAT"; t.style.color = "var(--danger)";
        }
        save(); view('v-win');
    }

    applyTheme(); save();
</script>
</body>
</html>
