<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20? SUPREME ENGINE v2.1</title>
    <style>
        :root {
            --bg: #020617; 
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #8b5cf6; 
            --success: #22c55e; 
            --danger: #ef4444;
            --warning: #f59e0b; /* FIX: Added missing warning color */
            --text: #f8fafc; 
            --font: 'Inter', system-ui, sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; height: 100dvh; 
            font-family: var(--font);
            background: var(--bg); color: var(--text); 
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        .game-container { display: flex; flex-direction: column; height: 100dvh; }
        .side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        #guesser-side { 
            background: linear-gradient(135deg, #1e1b4b 0%, #020617 100%);
            transform: rotate(180deg); 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .dashboard {
            background: #0f172a; width: 85%; max-width: 380px; padding: 25px;
            border-radius: 24px; border: 1px solid var(--accent);
            display: flex; flex-direction: column; gap: 12px;
            max-height: 80vh; overflow-y: auto;
        }
        
        .ring-container { position: relative; width: 85px; height: 85px; }
        .ring-container svg { transform: rotate(-90deg); width: 85px; height: 85px; }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 7; }
        .ring-bar { 
            fill: none; stroke: var(--accent); stroke-width: 7; 
            stroke-dasharray: 245; stroke-dashoffset: 0; 
            transition: 0.4s ease-out; stroke-linecap: round; 
        }

        .btn { 
            padding: 12px; border: none; border-radius: 12px; 
            font-weight: bold; color: white; cursor: pointer; 
            touch-action: manipulation; font-family: inherit; 
            transition: transform 0.1s, opacity 0.1s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .yes { background: var(--success); } 
        .no { background: var(--danger); } 
        .util { background: #334155; }
        .host-btn { background: var(--accent); font-size: 1.2rem; padding: 18px 40px; border-radius: 50px; }

        .overlay { 
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); 
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 20px; 
        }
        .hidden { display: none !important; }
        
        /* FIX: Ensure font-size is 16px to prevent iOS auto-zoom */
        input, select { 
            background: var(--glass); border: 1px solid var(--accent); 
            color: white; padding: 12px; border-radius: 8px; 
            width: 100%; font-size: 16px; box-sizing: border-box;
        }
        
        #last-answer { font-size: 4rem; font-weight: 900; margin: 5px 0; }
        #clue-box { height: 3rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .hint-text { font-size: 0.8rem; color: var(--accent); font-weight: bold; }
        .reveal-text { font-size: 1.1rem; color: var(--text); letter-spacing: 2px; }

        @keyframes shake { 
            0%, 100% { transform: rotate(180deg) translateX(0); } 
            20% { transform: rotate(180deg) translateX(-6px); } 
            80% { transform: rotate(180deg) translateX(6px); } 
        }
        .shake-anim { animation: shake 0.25s ease-in-out; }
    </style>
</head>
<body>

<div id="main-menu" class="overlay">
    <h1 style="color:var(--accent); font-size: 4rem; margin: 0; letter-spacing: -4px;">20?</h1>
    <div style="margin: 15px 0; background: var(--glass); padding: 8px 16px; border-radius: 50px; font-size: 0.85rem;">
        <span id="menu-avatar">👤</span> LVL <span id="menu-lvl">1</span> | 💰 <span id="menu-coins">0</span>
    </div>
    <button class="host-btn btn" onclick="toggle('dashboard-overlay')">HOST GAME</button>
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button class="btn util" onclick="toggle('shop-overlay')">🛒 SHOP</button>
        <button class="btn util" onclick="alert('Rules: Host sets the word. Guesser gets 20 tries. Good luck!')">?</button>
    </div>
</div>

<div id="dashboard-overlay" class="overlay hidden">
    <div class="dashboard">
        <h2 style="margin:0; text-align:center; color: var(--accent);">HOST SETUP</h2>
        <input type="password" id="wordInput" placeholder="SECRET WORD">
        <select id="startQs">
            <option value="20">20 Questions</option>
            <option value="15">15 Questions</option>
            <option value="10">10 Questions</option>
        </select>
        <div style="display:flex; justify-content: space-between; align-items: center; font-size: 0.8rem; opacity: 0.8;">
            <span>DOUBLE PENALTY (MAY/DEP)</span>
            <input type="checkbox" id="checkPenalties" style="width:20px; height:20px;">
        </div>
        <button class="btn yes" style="padding:15px;" onclick="startGame()">START GAME</button>
        <button class="btn util" onclick="toggle('dashboard-overlay')">BACK</button>
    </div>
</div>

<div id="shop-overlay" class="overlay hidden">
    <h2>SHOP</h2>
    <p>Coins: <span id="shop-coins">0</span></p>
    <button class="btn util" style="width:200px; margin:5px;" onclick="buy('avatar', '🤖', 50)">Robot (50c)</button>
    <button class="btn util" style="width:200px; margin:5px;" onclick="buy('avatar', '👑', 100)">Crown (100c)</button>
    <button class="btn no" style="width:200px; margin-top:15px;" onclick="toggle('shop-overlay')">EXIT</button>
</div>

<div id="victory" class="overlay hidden">
    <h2 id="winStatus">RESULT</h2>
    <h1 id="finalWordDisplay" style="font-size: 4rem; color: var(--warning);">---</h1>
    <button class="btn yes" style="width:200px" onclick="location.reload()">PLAY AGAIN</button>
</div>

<div class="game-container">
    <div id="guesser-side" class="side">
        <div class="ring-container">
            <svg><circle class="ring-bg" cx="42" cy="42" r="39"/><circle id="prog-bar" class="ring-bar" cx="42" cy="42" r="39"/></svg>
            <div style="position:absolute; top:32px; left:0; width:85px; text-align:center; font-weight:bold; font-size:1.2rem;"><span class="q-val">20</span></div>
        </div>
        <div id="clue-box">
            <div id="hint-text" class="hint-text"></div>
            <div id="reveal-text" class="reveal-text"></div>
        </div>
        <div id="last-answer">READY</div>
    </div>

    <div id="host-side" class="side">
        <div id="peek-area" style="border: 1px solid var(--accent); padding: 12px 25px; border-radius: 50px; margin-bottom: 15px; cursor: pointer;" 
             onmousedown="show(true)" onmouseup="show(false)" onmouseleave="show(false)" 
             ontouchstart="show(true)" ontouchend="show(false)">
            PEEK: <span id="secret-word-display" style="opacity:0; color:var(--warning); font-weight:bold; transition: opacity 0.2s;">---</span>
        </div>
        <div class="controls" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 92%; max-width: 400px;">
            <button class="btn yes" onclick="handle('YES', 'var(--success)')">YES</button>
            <button class="btn no" onclick="handle('NO', 'var(--danger)')">NO</button>
            <button class="btn util" onclick="handle('MAYBE', 'var(--warning)')">MAY</button>
            <button class="btn util" onclick="handle('DEP.', '#3b82f6')">DEP.</button>
            <button class="btn yes" style="grid-column: span 3; height: 50px;" onclick="end(true)">🏆 GUESSED IT</button>
            <button class="btn util" onclick="giveHint()">HINT</button>
            <button class="btn util" style="grid-column: span 2;" onclick="undo()">UNDO</button>
            <button class="btn util" style="grid-column: span 2;" onclick="location.reload()">QUIT</button>
        </div>
    </div>
</div>

<script>
    // FIX: Added try-catch for localStorage to prevent app crash if data is corrupted
    let data = { xp: 0, lvl: 1, coins: 0, avatar: '👤' };
    try {
        const stored = localStorage.getItem('gameData');
        if (stored) data = JSON.parse(stored);
    } catch (e) {
        console.warn("Could not load local storage", e);
    }

    // State Variables
    let count = 20, maxQ = 20, secret = "";
    let gameState = { ans: "READY", col: "white", hint: "", reveal: "" };
    let historyStack = [];

    function save() { 
        localStorage.setItem('gameData', JSON.stringify(data)); 
        updateMenu(); 
    }
    
    function updateMenu() {
        document.getElementById('menu-lvl').innerText = data.lvl;
        document.getElementById('menu-coins').innerText = data.coins;
        document.getElementById('shop-coins').innerText = data.coins;
        document.getElementById('menu-avatar').innerText = data.avatar;
    }
    updateMenu();

    function toggle(id) { document.getElementById(id).classList.toggle('hidden'); }
    
    function buy(type, val, cost) {
        if(data.coins >= cost) { 
            data.coins -= cost; 
            data[type] = val; 
            save(); 
            alert("Unlocked!"); 
        } else {
            alert("Not enough coins!");
        }
    }

    function startGame() {
        secret = document.getElementById('wordInput').value.trim().toUpperCase();
        if(!secret) return alert("Enter a valid word!");
        
        maxQ = parseInt(document.getElementById('startQs').value) || 20;
        count = maxQ;
        
        gameState.reveal = secret.replace(/[A-Z]/g, "_ ");
        gameState.hint = "";
        gameState.ans = "READY";
        gameState.col = "white";
        historyStack = []; // Reset history
        
        document.getElementById('reveal-text').innerText = gameState.reveal;
        document.getElementById('secret-word-display').innerText = secret;
        document.getElementById('finalWordDisplay').innerText = secret;
        
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('dashboard-overlay').classList.add('hidden');
        
        updateUI();
    }

    function handle(ans, col) {
        if(count <= 0) return;
        
        // Save current state BEFORE modifying
        historyStack.push({
            count: count,
            ans: gameState.ans,
            col: gameState.col,
            hint: gameState.hint,
            reveal: gameState.reveal
        });

        let isDoublePen = document.getElementById('checkPenalties').checked;
        let cost = (isDoublePen && (ans === 'MAYBE' || ans === 'DEP.')) ? 2 : 1;
        count = Math.max(0, count - cost);
        
        if(ans === 'NO') {
            const guesser = document.getElementById('guesser-side');
            guesser.classList.remove('shake-anim');
            void guesser.offsetWidth; // Trigger reflow to restart animation
            guesser.classList.add('shake-anim');
        }

        gameState.ans = ans;
        gameState.col = col;
        updateUI();
        
        if(count === 0 && ans !== 'YES') {
            setTimeout(() => end(false), 500); // Slight delay so user sees the 0
        }
    }

    function updateUI() {
        document.querySelectorAll('.q-val').forEach(e => e.innerText = count);
        
        const disp = document.getElementById('last-answer');
        disp.innerText = gameState.ans; 
        disp.style.color = gameState.col;
        
        document.getElementById('hint-text').innerText = gameState.hint;
        document.getElementById('reveal-text').innerText = gameState.reveal;

        const offset = 245 - (245 * (count / maxQ));
        document.getElementById('prog-bar').style.strokeDashoffset = offset;
    }

    function undo() {
        if(historyStack.length === 0) return;
        const last = historyStack.pop();
        
        count = last.count;
        gameState.ans = last.ans;
        gameState.col = last.col;
        gameState.hint = last.hint;
        gameState.reveal = last.reveal;
        
        updateUI();
    }

    function giveHint() {
        if(count < 5) return alert("Need at least 5 Questions for a hint!");
        const h = prompt("Enter a short hint:");
        if(h) {
            historyStack.push({ count, ...gameState }); // Copy current state
            count -= 5;
            gameState.hint = "HINT: " + h.toUpperCase();
            gameState.ans = "HINT";
            gameState.col = "var(--accent)";
            updateUI();
            
            if(count === 0) setTimeout(() => end(false), 500);
        }
    }

    function end(won) {
        if(won) {
            data.coins += 20; 
            data.xp += 50;
            if(data.xp >= data.lvl * 100) { 
                data.lvl++; 
                data.xp = 0; 
            }
            save();
            document.getElementById('winStatus').innerText = "VICTORY";
            document.getElementById('winStatus').style.color = "var(--success)";
        } else {
            document.getElementById('winStatus').innerText = "DEFEAT";
            document.getElementById('winStatus').style.color = "var(--danger)";
        }
        document.getElementById('victory').classList.remove('hidden');
    }

    function show(isVisible) { 
        document.getElementById('secret-word-display').style.opacity = isVisible ? 1 : 0; 
    }
</script>
</body>
</html>
