<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20 Questions: Ultra Edition</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --info: #3b82f6; --text: #f8fafc;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; 
            overflow: hidden; background: var(--bg); color: var(--text);
            user-select: none; -webkit-user-select: none;
        }

        .game-container { display: flex; flex-direction: column; height: 100vh; }
        .side { flex: 1; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

        #guesser-side { background: #1e1b4b; transform: rotate(180deg); border-bottom: 2px solid rgba(255,255,255,0.1); }
        #hint-display { font-size: 1.2rem; color: var(--warning); font-weight: bold; margin-top: 10px; min-height: 1.5rem; text-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }

        #host-side { background: #0f172a; }

        #peek-area { 
            background: var(--card); padding: 12px 24px; border-radius: 50px;
            margin-bottom: 15px; border: 1px solid var(--accent); 
            cursor: pointer; touch-action: none; font-size: 0.9rem;
        }
        #secret-word-display { opacity: 0; color: var(--warning); font-weight: 800; margin-left: 10px; transition: opacity 0.1s; }
        
        .badge { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin: 5px; border: 1px solid rgba(255,255,255,0.1); }
        #last-answer { font-size: 4.5rem; font-weight: 900; margin: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.1); text-align: center; }

        .controls { width: 95%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .ans-btn { padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; transition: 0.1s; }
        .ans-btn:active { transform: scale(0.95); }
        
        .yes { background: var(--success); } .no { background: var(--danger); } 
        .maybe { background: var(--warning); } .depends { background: var(--info); }
        .win-btn { grid-column: span 2; background: var(--accent); font-size: 1.1rem; }
        .util-btn { grid-column: span 1; background: #334155; font-size: 0.8rem; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { background: var(--card); border: 2px solid var(--accent); color: white; padding: 18px; width: 260px; border-radius: 16px; font-size: 1.2rem; margin: 10px; text-align: center; outline: none; }
        .primary-btn { background: var(--accent); color: white; padding: 16px 50px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="setup" class="overlay">
    <h1 style="color:var(--accent); font-size: 4rem; margin:0; letter-spacing: -2px;">20?</h1>
    <p style="opacity:0.6; margin-top:-5px;">TABLETOP EDITION</p>
    <input type="password" id="wordInput" placeholder="Enter Secret Word" autocomplete="off">
    <button class="primary-btn" onclick="startGame()">LOCK & START</button>
</div>

<div id="victory" class="overlay hidden">
    <h2 id="winStatus" style="color: var(--success); letter-spacing: 2px;">VICTORY</h2>
    <h1 id="finalWordDisplay" style="font-size: 5rem; color: var(--warning); margin: 10px 0;">---</h1>
    <button class="primary-btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

<div class="game-container">
    <div id="guesser-side" class="side">
        <div class="badge">CHANCES LEFT: <span class="q-val">20</span></div>
        <div id="last-answer">READY?</div>
        <div id="hint-display"></div>
    </div>

    <div id="host-side" class="side">
        <div id="peek-area" 
             onmousedown="showWord(true)" onmouseup="showWord(false)" 
             ontouchstart="showWord(true)" ontouchend="showWord(false)">
            HOLD TO PEEK: <span id="secret-word-display">---</span>
        </div>
        
        <div class="controls">
            <button class="ans-btn yes" onclick="handleAns('YES', '#22c55e')">YES</button>
            <button class="ans-btn no" onclick="handleAns('NO', '#ef4444')">NO</button>
            <button class="ans-btn maybe" onclick="handleAns('MAYBE', '#f59e0b')">MAYBE</button>
            <button class="ans-btn depends" onclick="handleAns('DEPENDS', '#3b82f6')">DEPENDS</button>
            
            <button class="ans-btn win-btn" onclick="endGame(true)">🏆 YOU GOT IT!</button>
            <button class="ans-btn util-btn" onclick="giveHint()" style="color: var(--warning)">HINT (-5)</button>
            
            <button class="ans-btn util-btn" style="grid-column: span 1.5;" onclick="undo()">UNDO</button>
            <button class="ans-btn util-btn" style="grid-column: span 1.5;" onclick="location.reload()">RESET</button>
        </div>
        <div class="badge" style="margin-top:20px">REMAINING: <span class="q-val">20</span></div>
    </div>
</div>

<script>
    let count = 20;
    let history = [];
    let secret = "";

    function startGame() {
        const input = document.getElementById('wordInput');
        const word = input.value.trim().toUpperCase();
        if (!word) return alert("Please type a secret word first!");
        secret = word;
        document.getElementById('secret-word-display').innerText = secret;
        document.getElementById('finalWordDisplay').innerText = secret;
        document.getElementById('setup').classList.add('hidden');
    }

    function showWord(visible) {
        document.getElementById('secret-word-display').style.opacity = visible ? "1" : "0";
    }

    function handleAns(ans, color) {
        if (count <= 0) return;
        saveHistory();
        count--;
        updateUI(ans, color);
        if (count <= 0) endGame(false);
    }

    function giveHint() {
        if (count < 5) return alert("Not enough questions left! A hint costs 5 questions.");
        const hint = prompt("Type a one-word hint (Costs 5 Questions):");
        if (hint) {
            saveHistory();
            count -= 5;
            document.getElementById('hint-display').innerText = "HINT: " + hint.toUpperCase();
            updateUI("HINT GIVEN", "var(--warning)");
            if (count <= 0 && document.getElementById('victory').classList.contains('hidden')) endGame(false);
        }
    }

    function saveHistory() {
        history.push({
            ans: document.getElementById('last-answer').innerText,
            color: document.getElementById('last-answer').style.color,
            count: count,
            hint: document.getElementById('hint-display').innerText
        });
    }

    function undo() {
        if (history.length === 0) return;
        const last = history.pop();
        count = last.count;
        document.getElementById('hint-display').innerText = last.hint;
        updateUI(last.ans, last.color);
    }

    function updateUI(ans, color) {
        document.querySelectorAll('.q-val').forEach(e => e.innerText = Math.max(0, count));
        const disp = document.getElementById('last-answer');
        disp.innerText = ans;
        disp.style.color = color;
    }

    function endGame(won) {
        if (!won) {
            document.getElementById('winStatus').innerText = "GAME OVER";
            document.getElementById('winStatus').style.color = "var(--danger)";
        } else {
            document.getElementById('winStatus').innerText = "VICTORY";
            document.getElementById('winStatus').style.color = "var(--success)";
        }
        document.getElementById('victory').classList.remove('hidden');
    }
</script>
</body>
</html>
